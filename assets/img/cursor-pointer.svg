    <path d="M18 24 C18 14, 26 14, 26 24 L26 28 C26 25, 30 25, 30 28 L30 30 C30 28, 34 28, 34 30 L34 32 C34 31, 38 31, 38 33 L38 43 C38 52, 26 52, 22 52 L14 42 C10 37, 13 32, 18 34 L18 24 Z" 
